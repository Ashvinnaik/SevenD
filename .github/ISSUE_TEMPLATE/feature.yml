name: "Feature Request"
description: "Propose a new feature (starts at Define phase)"
title: "[Feature] "
labels: ["feature", "define", "checkpoint:cp-1", "awaiting:agent"]
body:
  - type: markdown
    attributes:
      value: |
        ## 7D Framework: Feature Request
        This will start in the **Define** phase. Complete the problem definition below.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: "Users currently cannot... which causes..."
    validations:
      required: true

  - type: textarea
    id: users
    attributes:
      label: Who is Affected?
      description: Who experiences this problem?
    validations:
      required: true

  - type: textarea
    id: success
    attributes:
      label: Success Criteria
      description: How will we measure success?
      placeholder: |
        - [ ] Metric: ...
        - [ ] Users can: ...
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What's in and out of scope?
      placeholder: |
        **In Scope:**
        -
        **Out of Scope:**
        -

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "Critical"
        - "High"
        - "Medium"
        - "Low"
    validations:
      required: true
