name: "🚀 Deploy - Release Task"
description: "Deploy and release to production"
title: "[Deploy] "
labels: ["deploy", "delivery"]
body:
  - type: markdown
    attributes:
      value: |
        ## Delivery Cycle: Deploy Phase
        Release the completed work to production.

  - type: input
    id: related-issues
    attributes:
      label: Related Issues
      description: Link to issues being released
      placeholder: "#123, #124, #125"
    validations:
      required: true

  - type: textarea
    id: release-contents
    attributes:
      label: Release Contents
      description: What's included in this release?
      placeholder: |
        ## Features
        - [Feature description] (#issue)
        -

        ## Bug Fixes
        - [Fix description] (#issue)
        -

        ## Other Changes
        -
    validations:
      required: true

  - type: dropdown
    id: release-type
    attributes:
      label: Release Type
      options:
        - "Major (breaking changes)"
        - "Minor (new features)"
        - "Patch (bug fixes)"
        - "Hotfix (urgent production fix)"
    validations:
      required: true

  - type: textarea
    id: deployment-plan
    attributes:
      label: Deployment Plan
      description: Steps to deploy
      placeholder: |
        **Target Environment:** Production / Staging / Both

        **Deployment Steps:**
        1. [ ] Merge to main branch
        2. [ ] CI/CD pipeline runs
        3. [ ] Deploy to staging
        4. [ ] Smoke test staging
        5. [ ] Deploy to production
        6. [ ] Verify production

        **Rollback Plan:**
        - [How to rollback if issues arise]
    validations:
      required: true

  - type: textarea
    id: pre-deploy-checklist
    attributes:
      label: Pre-Deployment Checklist
      description: What must be verified before deploying?
      value: |
        - [ ] All PRs merged
        - [ ] All tests passing
        - [ ] No critical bugs open
        - [ ] Database migrations ready (if any)
        - [ ] Environment variables set (if any)
        - [ ] Feature flags configured (if any)
        - [ ] Stakeholders notified

  - type: textarea
    id: monitoring
    attributes:
      label: Monitoring & Alerts
      description: What to watch after deployment
      placeholder: |
        **Key Metrics to Watch:**
        - [ ] Error rates
        - [ ] Response times
        - [ ] User signups/conversions
        -

        **Alerts Configured:**
        - [ ] Error rate > X%
        - [ ] Response time > Xms
        -

        **Dashboard Links:**
        - [Link to monitoring dashboard]

  - type: textarea
    id: user-communication
    attributes:
      label: User Communication
      description: How will users be informed?
      placeholder: |
        - [ ] Release notes published
        - [ ] In-app notification (if applicable)
        - [ ] Email to users (if applicable)
        - [ ] Social media announcement (if applicable)

  - type: textarea
    id: post-deploy-checklist
    attributes:
      label: Post-Deployment Checklist
      description: What to verify after deploying?
      value: |
        - [ ] Smoke tests passing in production
        - [ ] Key user flows working
        - [ ] No spike in errors
        - [ ] Performance within acceptable range
        - [ ] Monitoring dashboards look healthy
        - [ ] User feedback collected (if applicable)

  - type: textarea
    id: retrospective
    attributes:
      label: Deployment Retrospective
      description: Fill in after deployment
      placeholder: |
        **Deployment Date/Time:**

        **What Went Well:**
        -

        **What Could Be Improved:**
        -

        **Issues Encountered:**
        -

        **Lessons Learned:**
        -
