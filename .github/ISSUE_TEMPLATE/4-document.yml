name: "📝 Document - Specification & Handoff"
description: "Create implementation specs and handoff documentation"
title: "[Document] "
labels: ["document", "docs"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bridge: Document Phase
        This phase bridges Discovery and Delivery. Create the specs needed for implementation.

  - type: input
    id: related-discovery
    attributes:
      label: Related Discovery Issues
      description: Link to the Define, Design, and Discover issues
      placeholder: "#101, #102, #103"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Feature/Change Summary
      description: Executive summary of what's being built
      placeholder: |
        **What:** One sentence describing the feature
        **Why:** The problem it solves
        **Who:** Who benefits
    validations:
      required: true

  - type: textarea
    id: implementation-spec
    attributes:
      label: Implementation Specification
      description: Detailed spec for developers
      placeholder: |
        ## Functional Requirements

        ### User Stories
        - As a [user], I want [goal] so that [benefit]
          - **Acceptance Criteria:**
            - [ ] Given [context], when [action], then [result]
            - [ ]

        ### Business Rules
        1.
        2.

        ## Technical Specification

        ### Architecture Changes
        -

        ### Data Changes
        -

        ### API Changes
        -

        ### UI Changes
        -
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Overall Acceptance Criteria
      description: How do we know the feature is complete?
      placeholder: |
        - [ ] All user stories implemented
        - [ ] Unit tests passing with >80% coverage
        - [ ] Integration tests passing
        - [ ] Performance within acceptable limits
        - [ ] Documentation updated
        - [ ] Accessibility requirements met
    validations:
      required: true

  - type: textarea
    id: decision-log
    attributes:
      label: Decision Log
      description: Key decisions made during Discovery
      placeholder: |
        | Decision | Rationale | Date | Participants |
        |----------|-----------|------|--------------|
        |          |           |      |              |

  - type: textarea
    id: out-of-scope
    attributes:
      label: Explicitly Out of Scope
      description: What will NOT be part of this implementation
      placeholder: |
        - [ ] [Feature/capability] - will be addressed in [future issue]
        -

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: What this work depends on or what depends on it
      placeholder: |
        **Blocked By:**
        - [ ] #issue - [description]

        **Blocks:**
        - [ ] #issue - [description]

        **External Dependencies:**
        -

  - type: textarea
    id: risks-mitigations
    attributes:
      label: Known Risks & Mitigations
      description: Risks carried forward from Discovery
      placeholder: |
        | Risk | Mitigation | Owner |
        |------|------------|-------|
        |      |            |       |

  - type: textarea
    id: exit-criteria
    attributes:
      label: Exit Criteria for Document Phase
      description: What must be true before moving to Diagnose?
      value: |
        - [ ] Implementation spec reviewed by dev team
        - [ ] Acceptance criteria are clear and testable
        - [ ] Dependencies identified and scheduled
        - [ ] Risks have mitigation plans
        - [ ] Ready for task breakdown
