name: "Bug Report"
description: "Report a bug (starts at Diagnose or Define depending on clarity)"
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## 7D Framework: Bug Report
        If the cause is known, this will start at **Diagnose**.
        If investigation is needed, this will start at **Define**.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What's happening?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead?
    validations:
      required: true

  - type: dropdown
    id: cause-known
    attributes:
      label: Is the root cause known?
      options:
        - "Yes - I know what's causing this"
        - "No - Investigation needed"
    validations:
      required: true

  - type: textarea
    id: cause
    attributes:
      label: Root Cause (if known)
      description: What's causing the bug?

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "Critical - System down"
        - "High - Major feature broken"
        - "Medium - Workaround exists"
        - "Low - Minor inconvenience"
    validations:
      required: true
