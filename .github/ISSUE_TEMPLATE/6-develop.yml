name: "💻 Develop - Implementation Task"
description: "A coding task to implement"
title: "[Develop] "
labels: ["develop", "delivery"]
body:
  - type: markdown
    attributes:
      value: |
        ## Delivery Cycle: Develop Phase
        This is an individual implementation task.

  - type: input
    id: parent-issue
    attributes:
      label: Parent Issue
      description: Link to the Diagnose issue this task came from
      placeholder: "#123"
    validations:
      required: true

  - type: textarea
    id: task-description
    attributes:
      label: Task Description
      description: What needs to be built?
      placeholder: |
        **What:** Clear description of the task
        **Where:** Files/components to modify
        **Why:** Context from the parent issue
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How do we know this task is done?
      placeholder: |
        - [ ] [Specific, testable criterion]
        - [ ] [Specific, testable criterion]
        - [ ] Unit tests written and passing
        - [ ] Code reviewed
    validations:
      required: true

  - type: textarea
    id: technical-notes
    attributes:
      label: Technical Notes
      description: Implementation guidance
      placeholder: |
        **Approach:**
        -

        **Files to Modify:**
        - `path/to/file.ts`
        -

        **References:**
        - [Similar code in codebase]
        -

  - type: dropdown
    id: size
    attributes:
      label: Size Estimate
      options:
        - "XS (< 2 hours)"
        - "S (2-4 hours)"
        - "M (1-2 days)"
        - "L (3-5 days)"
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: What blocks this or what this blocks
      placeholder: |
        **Blocked By:** #issue
        **Blocks:** #issue

  - type: textarea
    id: dev-checklist
    attributes:
      label: Development Checklist
      description: Standard checklist for development
      value: |
        - [ ] Implementation complete
        - [ ] Self-reviewed code
        - [ ] Unit tests added/updated
        - [ ] Integration tests (if applicable)
        - [ ] Documentation updated (if applicable)
        - [ ] PR created and linked
        - [ ] Code review requested
        - [ ] Code review feedback addressed
        - [ ] PR approved and merged
