name: "📋 Define - Problem Definition"
description: "Start here: Define the problem you're solving"
title: "[Define] "
labels: ["define", "discovery"]
body:
  - type: markdown
    attributes:
      value: |
        ## Discovery Cycle: Define Phase
        Use this template to clearly articulate what problem you're solving and for whom.

  - type: textarea
    id: problem-statement
    attributes:
      label: Problem Statement
      description: What pain point or opportunity are we addressing?
      placeholder: "Users currently struggle to... which results in..."
    validations:
      required: true

  - type: textarea
    id: affected-users
    attributes:
      label: Who is Affected?
      description: Who experiences this problem? Be specific about user types/personas.
      placeholder: |
        - Primary: [user type] who needs to [goal]
        - Secondary: [user type] who is impacted by [consequence]
    validations:
      required: true

  - type: textarea
    id: success-criteria
    attributes:
      label: Success Criteria
      description: How will we know we've solved this problem?
      placeholder: |
        - [ ] Metric: [specific measurable outcome]
        - [ ] User can: [specific capability]
        - [ ] System achieves: [specific behavior]
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What's included and explicitly excluded?
      placeholder: |
        **In Scope:**
        -

        **Out of Scope:**
        -
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Constraints & Assumptions
      description: What limitations or assumptions are we working with?
      placeholder: |
        **Constraints:**
        - Budget:
        - Timeline:
        - Technical:

        **Assumptions:**
        -

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "🔴 Critical"
        - "🟠 High"
        - "🟡 Medium"
        - "🟢 Low"
    validations:
      required: true

  - type: textarea
    id: exit-criteria
    attributes:
      label: Exit Criteria for Define Phase
      description: What must be true before moving to Design?
      value: |
        - [ ] Problem statement reviewed by stakeholders
        - [ ] Success criteria are measurable
        - [ ] Scope boundaries are clear
        - [ ] Key assumptions documented
