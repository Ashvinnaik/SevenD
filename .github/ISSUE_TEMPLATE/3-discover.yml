name: "🔍 Discover - Research & Validation"
description: "Validate assumptions through research and prototyping"
title: "[Discover] "
labels: ["discover", "discovery", "spike"]
body:
  - type: markdown
    attributes:
      value: |
        ## Discovery Cycle: Discover Phase
        Use this template to validate your design through research, spikes, and prototyping.

  - type: input
    id: related-design
    attributes:
      label: Related Design Issue
      description: Link to the Design issue this validates
      placeholder: "#123"
    validations:
      required: true

  - type: textarea
    id: hypothesis
    attributes:
      label: Hypothesis to Validate
      description: What assumption or design choice are you testing?
      placeholder: |
        **We believe that:** [assumption]
        **We will know this is true when:** [measurable outcome]
    validations:
      required: true

  - type: dropdown
    id: discovery-type
    attributes:
      label: Type of Discovery
      options:
        - "Technical Spike - Prove feasibility"
        - "Prototype - Test with users"
        - "Research - Gather information"
        - "Competitive Analysis - Learn from others"
        - "Performance Testing - Validate scale"
    validations:
      required: true

  - type: textarea
    id: approach
    attributes:
      label: Discovery Approach
      description: How will you validate the hypothesis?
      placeholder: |
        **Method:**
        - [ ] Build proof of concept
        - [ ] User interviews
        - [ ] Technical research
        - [ ] Performance benchmarks
        - [ ] Other: ___

        **Steps:**
        1.
        2.
        3.

        **Timebox:** [X hours/days]
    validations:
      required: true

  - type: textarea
    id: findings
    attributes:
      label: Findings (fill in after discovery)
      description: What did you learn?
      placeholder: |
        **Hypothesis Result:** ✅ Validated / ❌ Invalidated / ⚠️ Partially

        **Key Findings:**
        1.
        2.
        3.

        **Evidence:**
        - [links to prototypes, data, recordings]

        **Unexpected Discoveries:**
        -

  - type: textarea
    id: implications
    attributes:
      label: Implications for Design
      description: What changes are needed based on findings?
      placeholder: |
        **Design Changes Needed:**
        - [ ]

        **New Risks Identified:**
        - [ ]

        **Questions Remaining:**
        - [ ]

  - type: textarea
    id: exit-criteria
    attributes:
      label: Exit Criteria for Discover Phase
      description: What must be true before moving to Document?
      value: |
        - [ ] Hypothesis validated or invalidated with evidence
        - [ ] Findings documented
        - [ ] Design implications identified
        - [ ] Remaining risks acceptable
        - [ ] Ready to write implementation specs
