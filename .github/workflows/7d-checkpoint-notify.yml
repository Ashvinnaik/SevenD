name: 7D Checkpoint Notifications

on:
  issues:
    types: [labeled]

jobs:
  notify-agent:
    if: contains(github.event.label.name, 'awaiting:agent')
    runs-on: ubuntu-latest
    steps:
      - name: Post agent review request
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `## Agent Review Requested\n\nThis item is ready for checkpoint review. Agent, please:\n1. Review the phase outputs\n2. Complete the checkpoint validation\n3. Post your assessment using the checkpoint template\n4. Add \`agent:approved\` or \`agent:rejected\` label`
            });

  notify-human:
    if: contains(github.event.label.name, 'awaiting:human')
    runs-on: ubuntu-latest
    steps:
      - name: Post human review request
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `## Human Review Requested\n\nAgent has completed their assessment. Human reviewer, please:\n1. Review the agent's checkpoint assessment above\n2. Validate the evaluation\n3. Add \`human:approved\` or \`human:rejected\` label`
            });
