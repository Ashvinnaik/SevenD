name: 7D Metrics Collection

on:
  schedule:
    - cron: '0 9 * * 1' # Weekly on Monday at 9am UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  collect-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Collect phase metrics
        uses: actions/github-script@v7
        with:
          script: |
            // Collect open issues by phase label
            const phases = ['define', 'design', 'discover', 'document', 'diagnose', 'develop', 'deploy'];
            const metrics = {};

            for (const phase of phases) {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: phase,
                state: 'open'
              });
              metrics[phase] = issues.length;
            }

            // Collect checkpoint queue sizes
            const cpLabels = ['awaiting:agent', 'awaiting:human'];
            for (const label of cpLabels) {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: label,
                state: 'open'
              });
              metrics[label] = issues.length;
            }

            // Post metrics summary as issue comment or create summary issue
            const body = `## Weekly 7D Metrics Report\n\n` +
              `| Phase | Open Items |\n|-------|------------|\n` +
              phases.map(p => `| ${p} | ${metrics[p]} |`).join('\n') +
              `\n\n### Checkpoint Queues\n` +
              `- Awaiting Agent: ${metrics['awaiting:agent']}\n` +
              `- Awaiting Human: ${metrics['awaiting:human']}\n` +
              `\n_Generated: ${new Date().toISOString()}_`;

            console.log(body);

            // Optionally create a metrics issue
            // await github.rest.issues.create({
            //   owner: context.repo.owner,
            //   repo: context.repo.repo,
            //   title: `[Metrics] Weekly Report - ${new Date().toISOString().split('T')[0]}`,
            //   labels: ['metrics'],
            //   body: body
            // });
