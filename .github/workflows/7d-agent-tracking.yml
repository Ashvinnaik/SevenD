name: 7D Item Tracking

on:
  issues:
    types: [labeled, unlabeled, closed]
  schedule:
    - cron: '0 9 * * 1' # Weekly metrics on Monday 9am UTC
  workflow_dispatch:

jobs:
  # Track phase transitions and detect rework
  track-transitions:
    if: github.event_name == 'issues' && (github.event.action == 'labeled' || github.event.action == 'unlabeled')
    runs-on: ubuntu-latest
    steps:
      - name: Track phase transitions
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const label = context.payload.label;
            const action = context.payload.action;

            const phases = ['define', 'design', 'discover', 'document', 'diagnose', 'develop', 'deploy'];

            // Only track phase label changes
            if (!phases.includes(label.name)) return;

            if (action === 'labeled') {
              // Post transition comment
              const phaseIndex = phases.indexOf(label.name);
              const timestamp = new Date().toISOString();

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `**Phase Transition** — Entered **${label.name.toUpperCase()}** at ${timestamp}`
              });
            }

  # Auto-clean labels when both approvals are present
  auto-clean-approvals:
    if: >
      github.event_name == 'issues' &&
      github.event.action == 'labeled' &&
      (github.event.label.name == 'human:approved' || github.event.label.name == 'agent:approved')
    runs-on: ubuntu-latest
    steps:
      - name: Check for dual approval and advance
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);

            const hasAgentApproval = labels.includes('agent:approved');
            const hasHumanApproval = labels.includes('human:approved');

            if (!hasAgentApproval || !hasHumanApproval) return;

            // Both approvals present — advance to next phase
            const phases = ['define', 'design', 'discover', 'document', 'diagnose', 'develop', 'deploy'];
            const transitions = {
              'define': 'design', 'design': 'discover', 'discover': 'document',
              'document': 'diagnose', 'diagnose': 'develop', 'develop': 'deploy', 'deploy': 'done'
            };

            const currentPhase = phases.find(p => labels.includes(p));
            if (!currentPhase) return;

            const nextPhase = transitions[currentPhase];

            // Clean up approval and checkpoint labels
            const labelsToRemove = [
              'agent:approved', 'agent:rejected', 'human:approved', 'human:rejected',
              'awaiting:agent', 'awaiting:human',
              ...labels.filter(l => l.startsWith('checkpoint:'))
            ];

            for (const label of labelsToRemove) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, name: label
              }).catch(() => {});
            }

            // Remove current phase, add next phase
            await github.rest.issues.removeLabel({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue.number, name: currentPhase
            }).catch(() => {});

            if (nextPhase === 'done') {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, state: 'closed'
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number,
                body: '## Done\n\nAll checkpoints passed. Item completed the full 7D lifecycle.'
              });
            } else {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, labels: [nextPhase]
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number,
                body: `## Checkpoint Passed\n\nBoth agent and human approved. Advancing to **${nextPhase.toUpperCase()}** phase.`
              });
            }

  # Weekly metrics collection
  weekly-metrics:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Collect and report metrics
        uses: actions/github-script@v7
        with:
          script: |
            const phases = ['define', 'design', 'discover', 'document', 'diagnose', 'develop', 'deploy'];
            const metrics = {};

            // Count open issues per phase
            for (const phase of phases) {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner, repo: context.repo.repo,
                labels: phase, state: 'open'
              });
              metrics[phase] = issues.length;
            }

            // Count checkpoint queues
            for (const label of ['awaiting:agent', 'awaiting:human']) {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner, repo: context.repo.repo,
                labels: label, state: 'open'
              });
              metrics[label] = issues.length;
            }

            // Count rejections (rework)
            for (const label of ['agent:rejected', 'human:rejected']) {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner, repo: context.repo.repo,
                labels: label, state: 'open'
              });
              metrics[label] = issues.length;
            }

            // Completed this week
            const weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();
            const { data: closedRecent } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'closed', since: weekAgo
            });
            metrics['completed_this_week'] = closedRecent.length;

            // Build report
            const body = [
              `## Weekly 7D Metrics Report`,
              '',
              `### Phase Distribution (Open Items)`,
              '',
              `| Phase | Count |`,
              `|-------|-------|`,
              ...phases.map(p => `| ${p} | ${metrics[p]} |`),
              '',
              `### Checkpoint Queues`,
              `- Awaiting Agent Review: ${metrics['awaiting:agent']}`,
              `- Awaiting Human Review: ${metrics['awaiting:human']}`,
              '',
              `### Rework`,
              `- Agent Rejected: ${metrics['agent:rejected']}`,
              `- Human Rejected: ${metrics['human:rejected']}`,
              '',
              `### Throughput`,
              `- Completed This Week: ${metrics['completed_this_week']}`,
              '',
              `_Generated: ${new Date().toISOString()}_`
            ].join('\n');

            console.log(body);

            // Optionally create a metrics issue
            // Uncomment below to auto-create weekly report issues:
            // await github.rest.issues.create({
            //   owner: context.repo.owner, repo: context.repo.repo,
            //   title: `[Metrics] Weekly Report - ${new Date().toISOString().split('T')[0]}`,
            //   labels: ['metrics'],
            //   body: body
            // });
