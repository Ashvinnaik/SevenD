<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#57606a"/>
    </marker>
    <marker id="arrowLoop" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8250df"/>
    </marker>
  </defs>

  <!-- loop band labels -->
  <text x="180" y="40" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="1.5" fill="#57606a">PRODUCT LOOP</text>
  <text x="780" y="40" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="1.5" fill="#57606a">TECH LOOP</text>

  <!-- top row arrows -->
  <line x1="160" y1="95" x2="180" y2="95" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="310" y1="95" x2="330" y2="95" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="640" y1="95" x2="660" y2="95" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="790" y1="95" x2="810" y2="95" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Design -> Documentation -> Development (the sync bridge) -->
  <path d="M460,95 C500,95 500,190 540,190" fill="none" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M660,190 C500,190 500,95 460,95" fill="none" stroke="none"/>
  <path d="M660,190 C620,190 620,95 580,95" fill="none" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- PRODUCT phases -->
  <g>
    <rect x="30" y="70" width="130" height="50" rx="9" fill="#1d76db"/>
    <text x="95" y="100" text-anchor="middle" font-size="15" font-weight="600" fill="#fff">1 · Discovery</text>
  </g>
  <g>
    <rect x="180" y="70" width="130" height="50" rx="9" fill="#5319e7"/>
    <text x="245" y="100" text-anchor="middle" font-size="15" font-weight="600" fill="#fff">2 · Definition</text>
  </g>
  <g>
    <rect x="330" y="70" width="130" height="50" rx="9" fill="#0075ca"/>
    <text x="395" y="100" text-anchor="middle" font-size="15" font-weight="600" fill="#fff">3 · Design</text>
  </g>

  <!-- DOCUMENTATION bridge -->
  <g>
    <rect x="540" y="165" width="160" height="50" rx="9" fill="#006b75"/>
    <text x="620" y="189" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">4 · Documentation</text>
    <text x="620" y="205" text-anchor="middle" font-size="10.5" fill="#b8e6ea">sync point</text>
  </g>

  <!-- TECH phases -->
  <g>
    <rect x="510" y="70" width="130" height="50" rx="9" fill="#0e8a16"/>
    <text x="575" y="100" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">5 · Development</text>
  </g>
  <g>
    <rect x="660" y="70" width="130" height="50" rx="9" fill="#bf8700"/>
    <text x="725" y="100" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">6 · Diagnostics</text>
  </g>
  <g>
    <rect x="810" y="70" width="130" height="50" rx="9" fill="#d93f0b"/>
    <text x="875" y="100" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">7 · Deployment</text>
  </g>

  <!-- feedback loop: Deployment -> Discovery -->
  <path d="M875,120 C875,300 95,300 95,120" fill="none" stroke="#8250df" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrowLoop)"/>
  <text x="485" y="295" text-anchor="middle" font-size="12.5" font-weight="600" fill="#8250df">ship → monitor → learn → iterate</text>

  <!-- phase gate note -->
  <text x="485" y="345" text-anchor="middle" font-size="12" fill="#57606a">Phase gates block premature advance · sprints close only at zero bugs</text>
</svg>
